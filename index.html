<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CosmoCheck — 북미 화장품 라벨 문안 도우미</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f4;--card:#fff;--border:#e8e8e8;--text:#1a1a1a;--text2:#666;--text3:#999;--green:#2d7d2d;--yellow:#b8860b;--red:#c62828;--blue:#1565c0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06)}
body{font-family:Pretendard,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.wrap{max-width:800px;margin:0 auto;padding:20px}
header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100}
header .inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:700;font-size:18px;color:var(--text);text-decoration:none}.logo span{color:var(--blue)}
.nav-link{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.section-title{font-size:18px;font-weight:700;margin-bottom:8px}
.section-desc{font-size:14px;color:var(--text2);margin-bottom:16px}
.tag-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;user-select:none}
.tag:hover{border-color:var(--text2)}.tag.selected{background:var(--text);color:#fff;border-color:var(--text)}
.tag.otc::after{content:'⚠ OTC';font-size:10px;color:var(--red);margin-left:4px}.tag.selected.otc::after{color:#ffcdd2}
.tag.disabled{opacity:.4;cursor:default;pointer-events:none}
.cat-card{text-align:center;padding:16px;cursor:pointer;min-width:90px}
.cat-card .icon{font-size:28px;margin-bottom:6px}.cat-card .label{font-size:13px;font-weight:600}
.cat-card.disabled{opacity:.35;cursor:default}.cat-card.disabled .label::after{content:' · 준비중';color:var(--text3);font-weight:400;font-size:11px}
.cat-card.selected{border-color:var(--text);background:#f0f0ee}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--text);color:#fff;width:100%}.btn-primary:hover{background:#333}.btn-primary:disabled{background:var(--border);color:var(--text3);cursor:default}
.btn-secondary{background:var(--card);color:var(--text);border:1.5px solid var(--border)}.btn-sm{padding:8px 14px;font-size:12px}
.alert{padding:14px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.alert-warn{background:#fff8e1;border:1px solid #ffe082;color:#7b6b00}.alert-error{background:#ffebee;border:1px solid #ef9a9a;color:var(--red)}
.alert-info{background:#e3f2fd;border:1px solid #90caf9;color:var(--blue)}.alert-success{background:#e8f5e9;border:1px solid #a5d6a7;color:var(--green)}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0}
.tab{padding:10px 18px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.claim{padding:14px 16px;border-radius:10px;margin-bottom:8px;font-size:13px;line-height:1.7}
.claim-allowed{background:#e8f5e9;border-left:4px solid var(--green)}.claim-caution{background:#fff8e1;border-left:4px solid var(--yellow)}.claim-prohibited{background:#ffebee;border-left:4px solid var(--red)}
.claim .lb{font-weight:700;margin-bottom:4px}.claim .alt{margin-top:6px;padding:8px 12px;background:rgba(255,255,255,.6);border-radius:6px;font-size:12px}
.claim .detail{margin-top:8px;padding:10px 12px;background:rgba(255,255,255,.7);border-radius:8px;font-size:12px;display:none}.claim .detail.open{display:block}
.dtoggle{font-size:12px;color:var(--blue);cursor:pointer;margin-top:6px;display:inline-block}
.field{margin-bottom:16px}.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.field input,.field textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card)}
.field textarea{min-height:100px;resize:vertical}.field .hint{font-size:12px;color:var(--text3);margin-top:4px}
.check-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.check-item input[type=checkbox]{margin-top:3px;width:18px;height:18px;accent-color:var(--green)}
.check-item .info .name{font-weight:600;font-size:14px}.check-item .info .desc{font-size:13px;color:var(--text2);margin-top:2px}
.preview{background:#fafafa;border:2px dashed var(--border);border-radius:var(--radius);padding:20px;font-size:13px;line-height:1.8;white-space:pre-wrap;font-family:Pretendard,-apple-system,sans-serif}
.faq-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--text);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:200;transition:transform .2s}.faq-btn:hover{transform:scale(1.08)}
.faq-panel{position:fixed;bottom:90px;right:24px;width:340px;max-height:480px;background:var(--card);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:200;display:none;flex-direction:column;overflow:hidden;border:1px solid var(--border)}.faq-panel.open{display:flex}
.faq-header{padding:14px 16px;font-weight:700;font-size:15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.faq-search{padding:12px 16px;border-bottom:1px solid var(--border)}.faq-search input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit}
.faq-body{flex:1;overflow-y:auto;padding:12px 16px}
.faq-item{padding:12px;background:#fafafa;border-radius:8px;margin-bottom:8px;font-size:13px}.faq-item .q{font-weight:600;margin-bottom:4px}.faq-item .a{color:var(--text2);line-height:1.6}
.faq-tabs{display:flex;gap:4px;padding:8px 16px;border-bottom:1px solid var(--border)}.faq-tab{font-size:12px;padding:4px 10px;border-radius:12px;cursor:pointer;color:var(--text2);font-weight:500}.faq-tab.active{background:var(--text);color:#fff}
.disclaimer{font-size:12px;color:var(--text3);background:#f5f4f1;padding:12px 16px;border-radius:8px;margin-top:24px;line-height:1.7}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:12px}.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
:root{--mocra:#e65100}
.panel-section{border-left:3px solid var(--blue);padding-left:16px;margin-bottom:8px}
.panel-section.pdp{border-left-color:var(--blue)}
.panel-section.info{border-left-color:var(--green)}
.panel-section.ing-section{border-left-color:var(--yellow)}
.panel-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}.panel-header .panel-icon{font-size:18px}.panel-header .panel-title{font-size:16px;font-weight:700}.panel-header .panel-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.panel-desc{font-size:13px;color:var(--text2);margin-bottom:16px}
.toggle-group{display:inline-flex;gap:0;background:var(--bg);border-radius:10px;padding:3px;border:1px solid var(--border)}
.toggle-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--text2);transition:all .2s}
.toggle-btn.active{background:var(--text);color:#fff}
.req-label{font-size:11px;font-weight:600;margin-left:4px}.req-must{color:var(--red)}.req-mocra{color:var(--mocra)}.req-opt{color:var(--text3)}.req-cond{color:var(--yellow)}
.caution-tmpls{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.caution-tmpl-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;border:1.5px solid #ffe082;background:#fffde7;color:#7b6b00;cursor:pointer;transition:all .2s}
.caution-tmpl-btn:hover{background:#fff8e1;border-color:#ffca28}
.origin-display{padding:10px 14px;background:#f5f4f1;border-radius:8px;font-size:14px;color:var(--text);font-weight:500}
.field{margin-bottom:20px}
@media(max-width:600px){.wrap{padding:16px}.faq-panel{width:calc(100% - 32px);right:16px;bottom:80px}}
</style>
</head>
<body>
<header><div class="inner"><a href="#home" class="logo">Cosmo<span>Check</span> <span style="font-size:11px;font-weight:400;color:var(--text3);margin-left:4px">by grandeclip</span></a><nav id="nav"></nav></div></header>
<div class="wrap" id="app"></div>
<button class="faq-btn" id="faqBtn" title="규제 FAQ">💬</button>

</div>

const SC={"cleanser":{"n":"Gentle Foaming Cleanser","w":"5.0 fl oz (150 mL)","d":"Apply to damp skin, massage gently, rinse thoroughly with water.","e":"Gently removes impurities for refreshed, clean-feeling skin.","k":"부드러운 거품으로 피부 노폐물을 깨끗하게 세정해줍니다."},"toner":{"n":"Hydrating Facial Toner","w":"6.76 fl oz (200 mL)","d":"After cleansing, apply to face with cotton pad or fingertips.","e":"Balances and refreshes skin for a smooth, hydrated appearance.","k":"피부결을 정돈하고 촉촉한 피부로 가꿔줍니다."},"serum":{"n":"Brightening Facial Serum","w":"1.01 fl oz (30 mL)","d":"Apply a small amount to face and neck. Follow with moisturizer.","e":"Helps brighten the appearance of skin for a radiant-looking complexion.","k":"피부 톤을 밝게 가꿔주는 집중 세럼이에요."},"cream":{"n":"Moisturizing Cream","w":"1.69 fl oz (50 mL)","d":"Apply evenly to face and neck morning and evening.","e":"Rich hydration that leaves skin feeling soft and supple.","k":"풍부한 수분감으로 부드러운 피부로 가꿔줍니다."},"sunscreen":{"n":"Broad Spectrum SPF 50+ Sunscreen","w":"1.69 fl oz (50 mL)","d":"Apply liberally 15 minutes before sun exposure. Reapply every 2 hours.","e":"Helps prevent sunburn.","k":"자외선으로부터 피부를 보호해줍니다."},"essence":{"n":"First Treatment Essence","w":"5.07 fl oz (150 mL)","d":"After cleansing and toning, pat gently onto face.","e":"Lightweight essence that helps improve the appearance of skin texture.","k":"피부결을 매끄럽게 가꿔주는 가벼운 에센스에요."},"ampoule":{"n":"Intensive Repair Ampoule","w":"1.01 fl oz (30 mL)","d":"Apply 2-3 drops to face after toner.","e":"Concentrated care that helps improve the look of tired skin.","k":"지친 피부를 위한 집중 케어 앰플이에요."},"eye_cream":{"n":"Revitalizing Eye Cream","w":"0.84 fl oz (25 mL)","d":"Gently pat around the eye area.","e":"Helps reduce the appearance of fine lines around the eye area.","k":"눈가 잔주름을 매끄럽게 가꿔줍니다."},"sheet_mask":{"n":"Hydrating Sheet Mask","w":"1 sheet (25 mL)","d":"Place mask on clean face for 15-20 minutes.","e":"Intensive hydration boost for a plump, dewy appearance.","k":"집중 수분 충전으로 촉촉한 피부를 가꿔줍니다."} .","e":"Infused with ginseng extract and biotin, this nourishing shampoo helps hair look thicker, shinier, and more manageable after every wash.","k":"인삼 추출물과 비오틴이 함유된 풍부한 포뮬러가 매 세정 후 모발을 더 볼륨감 있고 윤기나 보이게 해줘요."},"conditioner":{"n":"Intensely Hydrating Conditioner","w":"13.5 fl oz (400 mL)","d":"After shampooing, apply evenly to hair. Leave on for 2-3 minutes, then rinse thoroughly.","e":"Rich in ceramide and amino acids, this conditioner visibly smooths frizz and leaves hair feeling silky and conditioned.","k":"세라마이드와 아미노산이 풍부하게 함유돼 눈에 띄게 매끄럽고 부드러운 모발로 가꿔줘요."},"hair_treatment":{"n":"Intensive Repair Hair Mask","w":"8.45 fl oz (250 mL)","d":"After shampooing, apply generously to damp hair from mid-length to ends. Leave on for 5-10 minutes, then rinse thoroughly.","e":"This deeply nourishing mask infuses hair with moisture and proteins, visibly reducing breakage and leaving hair looking healthier and more lustrous.","k":"고농도 모이스처와 단백질이 모발 깊숙이 침투해 끊어짐을 눈에 띄게 줄이고 건강하고 윤기 있어 보이는 모발로 가꿔줘요."},"hair_styling":{"n":"Flexible Hold Hair Spray","w":"7.0 oz (198 g)","d":"Hold 8-12 inches from hair and spray evenly. Style as desired.","e":"Provides flexible, touchable hold while adding shine for a polished, natural-looking finish.","k":"유연한 홀드감으로 원하는 스타일을 자연스럽게 완성해줘요. 윤기도 더해져요."},"hair_color":{"n":"Permanent Hair Color — Natural Black","w":"Net Wt. 3.53 oz (100 g)","d":"Perform patch test 48 hours before use. See enclosed instructions.","e":"Rich, long-lasting color with a mirror-like shine — for vibrant, healthy-looking hair.","k":"풍부하고 오래 지속되는 컬러와 거울 같은 광택으로 선명하고 건강해 보이는 모발을 완성해줘요."},"anti_dandruff":{"n":"Anti-Dandruff Shampoo","w":"13.5 fl oz (400 mL)","d":"For best results, use at least twice a week or as directed by a doctor. Wet hair, apply to scalp, massage gently. Leave on for several minutes, then rinse.","e":"Clinically proven active ingredient works to control dandruff and soothe scalp — leaving hair clean and refreshed.","k":"임상적으로 입증된 성분이 비듬을 효과적으로 케어하고 두피를 진정시켜줘요."},  a luminous, radiant glow"}]},{"s":"a","ko":"피부색을 고르게 보이게 해요","en":"Evens out the appearance of skin tone","r":"겉모습의 균일함 개선은 외관 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Dr.Jart+","p":"Vital Hydra Solution Biome Essence","e":"Evens out the appearance of skin tone"},{"b":"Klairs","p":"Freshly Juiced Vitamin Drop","e":"Helps to visibly even skin tone over time"}]},{"s":"a","ko":"칙칙해 보이는 피부 외관을 개선해요","en":"Improves the appearance of dull-looking skin","r":"칙칙함은 외관 묘사이며 신체 기능 변화와 무관해요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Innisfree","p":"Vitamin C Green Tea Enzyme Brightening Toner","e":"Improves the appearance of dull, uneven-looking skin"}]},{"s":"a","ko":"다크서클이 줄어 보여요","en":"Visibly reduces the appearance of dark circles","r":"다크서클 외관 개선은 화장품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Cosrx","p":"Advanced Snail 92 All in one Cream","e":"Visibly reduces the appearance of dark circles"}]},{"s":"c","ko":"기미·잡티를 옅어 보이게 해요","en":"Fades the appearance of dark spots","r":"'옅어 보이게(fades the appearance)'는 허용이지만 '기미를 없앤다', '잡티를 치료한다'로 표현하면 금지돼요. 표현의 경계가 얇아요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Cosmetic claims may describe a change in the visual appearance of dark spots. However, claims that purport to treat hyperpigmentation as a medical condition (e.g., 'treats dark spots') cross into drug territory.","dk":"기미(melasma)·잡티(dark spots)는 의학적 상태로도 분류될 수 있어요. 'fades the appearance of'는 외관 표현으로 허용되지만, 'treats', 'corrects', 'removes'는 의약품 클레임이에요. 미국에서 미백 성분(하이드로퀴논 등)을 함유하면 별도 OTC 등록이 필요할 수 있어요.","ak":"다크스팟의 겉모습이 줄어 보여요","ae":"Helps visibly fade the look of dark spots over time","me":[{"b":"Klairs","p":"Freshly Juiced Vitamin Drop","e":"Fades the appearance of dark spots — 허용 범위"},{"b":"Some By Mi","p":"Galactomyces 30 Days Miracle Cream","e":"Fades dark spots — 경계선에 있는 표현"}]},{"s":"c","ko":"피부 투명도를 높여요","en":"Increases skin clarity","r":"'높인다(increases)'는 기능 변화 암시. '더 투명해 보여요'처럼 외관 표현으로 바꾸는 것이 안전해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Terms like 'increases' when used with physiological properties such as 'clarity' or 'transparency' may imply a functional change to the skin, which crosses into drug territory.","dk":"'clarity'는 외관적 의미도 있어요. 그러나 'increases skin clarity'는 피부 자체의 생리적 상태를 변화시킨다고 해석될 여지가 있어요. 'for a clearer-looking complexion' 또는 'skin looks clearer'로 표현을 바꾸면 안전해요.","ak":"피부가 더 투명해 보여요","ae":"For a visibly clearer, more translucent complexion","me":[{"b":"Cosrx","p":"Propolis Light Ampule","e":"Increases skin clarity — 주의 표현"}]},{"s":"c","ko":"색소 침착을 줄여요","en":"Reduces pigmentation","r":"색소 침착 '감소'는 멜라닌 생성 억제를 암시할 수 있어요. 피부 외관에 한정하는 표현이 더 안전해요","law":"21 CFR 700 / 21 CFR 310.545","ste":"Claims to 'reduce pigmentation' are ambiguous and can be interpreted as either a cosmetic claim (changing appearance) or a drug claim (affecting melanin synthesis). The intent and context determine classification.","dk":"'reduces pigmentation' 단독으로는 외관 변화인지 생리적 기능 변화인지 불명확해요. 선스크린 클레임과 결합되면 더욱 복잡해져요. 'visibly reduces the appearance of uneven pigmentation'처럼 외관에 한정하면 더 안전해요.","ak":"피부색 불균일함의 겉모습을 개선해요","ae":"Visibly reduces the appearance of uneven pigmentation","me":[{"b":"Torriden","p":"Solid-In Niacinamide Toner","e":"Reduces pigmentation — 주의 필요"}]},{"s":"p","ko":"멜라닌 생성을 억제해요","en":"Inhibits melanin production","r":"신체 기능(멜라닌 합성 과정) 억제를 주장하는 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g) / 21 CFR 310.545","ste":"FDA has determined that claims to 'inhibit melanin production' or 'suppress melanin synthesis' constitute drug claims, as they assert an effect on a physiological function of the body — the melanin synthesis pathway.","dk":"멜라닌은 신체가 생성하는 색소예요. 그 '생성(production)'을 '억제(inhibit)'한다는 것은 명백히 생체 기능 변화를 주장해요. 미국에서는 이런 효능을 주장하려면 OTC 의약품으로 등록해야 해요 (현재 미국에서 OTC 미백제는 허가된 단일 활성 성분이 없어 사실상 불가).","ak":"피부 톤이 균일해 보여요","ae":"For a more even-looking, luminous complexion","me":[{"b":"Benton","p":"Aloe BHA Skin Toner","e":"Inhibits melanin production — 수입 거부 사례 유사 패턴"}]},{"s":"p","ko":"기미를 치료해요","en":"Treats dark spots / Treats hyperpigmentation","r":"치료(treat)는 의약품 클레임 핵심 용어예요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"The word 'treat' is a quintessential drug claim term under the FD&C Act. Any claim to 'treat' a skin condition implies disease treatment.","dk":"'치료(treat/cure)'는 FDA 기준 가장 명확한 의약품 클레임 용어예요. '기미', '색소 침착', '과색소침착증'은 의학적 상태이므로 이를 '치료한다'고 하면 즉시 의약품으로 분류돼요.","ak":"기미의 겉모습이 줄어 보여요","ae":"Visibly fades the look of dark spots over time"},{"s":"p","ko":"피부를 미백해요","en":"Whitens / Bleaches skin","r":"피부색 자체를 변화시킨다는 구조적 변화 주장이에요. 미국에서 OTC 미백제는 현재 사실상 허가 불가 상태예요","law":"21 CFR 310.545 / FD&C Act §201(g)","ste":"FDA's 1996 Final Rule deemed skin bleaching and skin lightening active ingredients used in OTC products as not generally recognized as safe and effective (GRASE). Products claiming to 'whiten' or 'bleach' skin are subject to drug regulations.","dk":"미국에서 'whitens skin', 'bleaches skin', 'lightens skin color'는 모두 OTC 의약품 클레임이에요. 1996년 FDA 규정에서 OTC 피부 미백제 성분(하이드로퀴논 포함)이 GRASE로 인정받지 못해 사실상 판매 불가 상태예요.","ak":"피부 톤을 밝아 보이게 해요","ae":"Brightens the appearance of skin"},{"s":"p","ko":"티로시나아제 활성을 억제해요","en":"Inhibits tyrosinase activity","r":"효소 활성 억제는 명백히 신체 생화학적 기능 변화를 주장해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims asserting the inhibition of a specific enzyme (tyrosinase) involved in melanin synthesis constitute drug claims, as they describe interference with a biochemical pathway in the body.","dk":"티로시나아제는 멜라닌 합성 경로의 핵심 효소예요. 과학 논문 표현이 그대로 마케팅 카피에 쓰이는 경우가 있는데, 이는 명확한 의약품 클레임이에요. 성분명을 설명하는 연구 자료와 소비자 대상 마케팅 카피는 구분해야 해요.","ak":"밝고 균일한 피부 톤","ae":"For a bright, even-toned complexion","me":[{"b":"Torriden","p":"일부 성분 설명","e":"Inhibits tyrosinase — 성분 설명에서 소비자 카피로 노출되면 위반"}]},{"s":"p","ko":"색소 세포를 파괴해요","en":"Destroys pigment cells / Destroys melanocytes","r":"세포 파괴는 가장 직접적인 신체 구조 변화 주장이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Any claim asserting the destruction of specific cell types in the body constitutes an unambiguous drug claim under the FD&C Act.","dk":"어떤 화장품도 세포를 파괴한다고 주장할 수 없어요. 이는 의약품이나 의료기기의 영역이에요. 만약 실제 성분이 이런 작용을 한다면 화장품이 아닌 별도 FDA 승인이 필요한 제품이에요.","ak":"피부 광채를 살려요","ae":"Enhances skin's natural radiance"}],"acne":[{"s":"a","ko":"피부 결점이 줄어 보여요","en":"Visibly minimizes the appearance of blemishes","r":"'겉모습'에 한정한 외관 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Cosrx","p":"AC Collection Blemish Spot Clearing Serum","e":"Visibly minimizes the appearance of blemishes"},{"b":"Some By Mi","p":"AHA BHA PHA 30 Days Miracle Serum","e":"Visibly reduces the look of blemishes"}]},{"s":"a","ko":"트러블 이후 붉음기가 줄어 보여요","en":"Visibly reduces post-blemish redness","r":"붉음기는 외관 묘사이고 '보인다'로 한정했어요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Dr.Jart+","p":"Cicapair Tiger Grass Color Correcting Treatment","e":"Visibly reduces post-blemish redness and redness appearance"},{"b":"Cosrx","p":"AC Collection Calming Foam Cleanser","e":"Soothes the look of troubled skin"}]},{"s":"a","ko":"피부 결점이 덜 보여요","en":"Helps skin look clearer and less congested","r":"외관 상태를 묘사하는 표현이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Innisfree","p":"Pore Clearing Clay Mask","e":"Helps skin look clearer and feel less congested"}]},{"s":"a","ko":"트러블 이후 자국이 줄어 보여요","en":"Visibly reduces the look of post-acne marks","r":"트러블 흔적(흉터 아님)의 외관 개선은 화장품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Cosrx","p":"Advanced Snail 96 Mucin Power Essence","e":"Visibly fades the look of post-acne marks"}]},{"s":"a","ko":"매끄럽고 균일해 보이는 피부","en":"For skin that looks smooth and even","r":"피부 상태의 외관을 묘사하는 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Laneige","p":"Cream Skin Toner & Moisturizer","e":"For skin that looks smooth, plump, and even-toned"}]},{"s":"c","ko":"트러블성 피부에 도움이 돼요","en":"Helps with troubled skin","r":"'도움(helps with troubled skin)'은 맥락에 따라 치료 암시로 해석될 수 있어요. 제품 전체 문맥을 함께 봐야 해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"The phrase 'helps with troubled skin' is ambiguous. If surrounded by other acne-treatment claims or ingredient descriptions emphasizing acne-fighting properties, the totality of claims may constitute a drug claim.","dk":"단독으로는 허용될 수 있지만, 살리실산·벤조일퍼옥사이드 등 OTC 여드름 성분과 함께 쓰이면 전체 문맥이 여드름 치료 클레임이 돼요. 성분과 클레임을 함께 검토해야 해요.","ak":"트러블 이후 피부가 더 고르게 보여요","ae":"Skin looks more even and less congested","me":[{"b":"Cosrx","p":"Salicylic Acid Daily Gentle Cleanser","e":"Helps with troubled-looking skin — 성분(살리실산)과 결합 시 주의"}]},{"s":"c","ko":"피지 조절을 도와요","en":"Helps control excess oil","r":"'조절(control)'은 생체 기능 변화 암시. '기름기가 줄어 보여요' 등 외관 표현이 더 안전해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'control sebum' or 'regulate oil production' can be interpreted as affecting the sebaceous gland function — a physiological claim. Cosmetics may claim to make skin look less oily.","dk":"'피지 조절(sebum control/oil control)'은 피지선의 생리적 기능을 변화시킨다는 주장이에요. 대신 'skin looks less shiny', 'for a matte appearance', 'absorbs excess surface oil'처럼 표면 현상에 한정하면 더 안전해요.","ak":"피부 표면이 덜 번들거려 보여요","ae":"For a visibly matte, shine-free complexion","me":[{"b":"Some By Mi","p":"AHA BHA PHA 30 Days Miracle Toner","e":"Controls excess oil — 주의 필요 표현"},{"b":"Cosrx","p":"BHA Blackhead Power Liquid","e":"Helps control oil in pores — 경계선"}]},{"s":"c","ko":"블랙헤드를 제거해요","en":"Removes blackheads","r":"'제거(remove)'가 물리적 세정인지 생리적 변화인지에 따라 다르게 해석될 수 있어요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'remove blackheads' walk a fine line. If this implies dissolving or treating comedones as a medical condition, it becomes a drug claim. If it refers to physical cleansing action, it may remain cosmetic.","dk":"블랙헤드(面皰)는 의학적으로는 폐쇄 면포(comedone)예요. 여드름 진단 기준에 포함될 수 있어요. 살리실산을 함유하고 'removes blackheads'를 주장하면 OTC 여드름 치료제 클레임이 될 수 있어요. 'helps lift the look of clogged pores' 등 외관 표현이 더 안전해요.","ak":"모공이 깨끗해 보여요","ae":"Helps skin look clearer and pores appear less clogged","me":[{"b":"Cosrx","p":"BHA Blackhead Power Liquid","e":"Removes blackheads — 살리실산 함유 제품에서 이 표현 사용 시 OTC 클레임 위험"}]},{"s":"p","ko":"여드름을 치료해요","en":"Treats acne","r":"여드름 치료 클레임 자체가 OTC 의약품 등록을 요구하는 의약품 클레임이에요","law":"21 CFR 333 / FD&C Act §201(g)","ste":"Under 21 CFR 333, 'acne' is classified as a disease condition. Any product claiming to 'treat acne' must comply with the OTC monograph system and include Drug Facts labeling with approved active ingredients at specified concentrations.","dk":"FDA는 여드름(acne)을 질병으로 분류해요. '치료(treat)', '예방(prevent)', '개선(improve acne)' 모두 OTC 여드름 의약품 등록이 필요해요. 살리실산 0.5~2%, 벤조일퍼옥사이드 등 OTC 승인 성분 + Drug Facts 패널이 있어야 해요.","ak":"트러블 이후 피부가 더 균일해 보여요","ae":"Skin looks clearer and more even-toned","me":[{"b":"일반 사례","p":"여드름 클렌저","e":"Treats acne — 표준 위반 패턴. OTC 미등록 상태에서 사용 시 수입 거부"}]},{"s":"p","ko":"여드름을 예방해요","en":"Prevents acne","r":"여드름 예방도 OTC 여드름 의약품 클레임이에요","law":"21 CFR 333 / FD&C Act §201(g)","ste":"21 CFR 333 approved OTC acne drug products may claim to 'treat and prevent acne breakouts.' Non-OTC-registered products cannot use this claim.","dk":"실제 한국 FDA 수입 거부 사례에서 가장 많이 나오는 패턴이에요. '트러블 예방'도 동일하게 금지돼요. OTC 여드름 제품으로 등록하면 'helps prevent acne breakouts' 클레임이 허용되지만, 등록 없이는 사용 불가예요.","ak":"여드름 이후 피부가 깨끗해 보여요","ae":"Skin looks clearer and less congested","me":[{"b":"다수 한국 브랜드","p":"클렌저, 토너","e":"Prevents acne — 298건 수입 거부 사례 중 주요 원인 패턴"}]},{"s":"p","ko":"트러블을 개선해요","en":"Improves blemishes / Clears blemishes","r":"트러블(blemish) 개선은 질병 치료 암시로 OTC 클레임에 해당해요","law":"21 CFR 333 / FD&C Act §201(g)","ste":"Claims to 'clear' or 'improve' blemishes in the context of acne-prone skin have been cited in FDA enforcement actions as drug claims.","dk":"'clears blemishes', 'eliminates blemishes', 'improves acne blemishes'는 OTC 여드름 약품 클레임이에요. 반면 'visibly minimizes the appearance of blemishes'는 외관 클레임으로 허용돼요. '겉모습(appearance)'이라는 단어 하나가 결정적인 차이예요.","ak":"결점이 줄어 보여요","ae":"Visibly minimizes the appearance of blemishes","me":[{"b":"Some By Mi","p":"AHA BHA PHA 30 Days Miracle Cream","e":"Improves blemishes — 수정 전 표현으로 사용됨"}]},{"s":"p","ko":"모공 속 유분을 감소시켜요","en":"Reduces oil in pores","r":"모공 내 피지 분비를 감소시킨다는 생체 기능 변화 주장이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claiming to 'reduce oil in pores' implies affecting sebaceous gland function — the production of sebum — which constitutes a drug claim.","dk":"피지 분비는 피지선의 생리적 기능이에요. '모공 속 유분 감소'는 이 기능을 변화시킨다는 주장이에요. '표면 유분 흡수', '오일-프리 느낌' 등 표면 현상에 한정하는 표현이 안전해요.","ak":"피부 표면이 덜 번들거려 보여요","ae":"For skin that looks less oily and more matte"},{"s":"p","ko":"항균 작용으로 여드름균을 없애요","en":"Kills acne-causing bacteria / Antibacterial action against P. acnes","r":"균 살균 주장은 OTC 항균 제품 또는 의약품 클레임이에요","law":"21 CFR 333 / 21 CFR 310 / FDA Antibacterial Soap Rule (2016)","ste":"Claims to kill bacteria, particularly named bacteria such as C. acnes (P. acnes), are drug claims. The FDA's 2016 rule removed many antibacterial active ingredients from the cosmetic market.","dk":"여드름균(Cutibacterium acnes) 살균을 주장하면 OTC 여드름 의약품 클레임이에요. 2016년 FDA 항균 비누 규정 이후 트리클로산 등 많은 항균 성분이 화장품에서 퇴출됐어요. 살균 클레임은 화장품 영역을 벗어나요.","ak":"피부가 더 깨끗해 보여요","ae":"Leaves skin looking clean and clear"}],"moisturizing":[{"s":"a","ko":"피부를 촉촉하게 해요","en":"Moisturizes skin","r":"보습은 가장 기본적인 화장품 허용 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Laneige","p":"Water Bank Blue Hyaluronic Cream","e":"Deeply moisturizes skin for 72 hours"},{"b":"Cosrx","p":"Advanced Snail 92 All in One Cream","e":"Moisturizes and soothes skin"}]},{"s":"a","ko":"건조함을 완화해줘요","en":"Relieves dryness / Soothes dry skin","r":"건조 증상 완화는 외관/감각 변화로 화장품 허용 영역이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Klairs","p":"Supple Preparation Unscented Toner","e":"Relieves dryness and soothes sensitive skin"},{"b":"Torriden","p":"Dive-In Low Molecular Hyaluronic Acid Serum","e":"Relieves dry, dehydrated skin"}]},{"s":"a","ko":"수분을 오래 유지해줘요","en":"Locks in moisture for up to 72 hours","r":"수분 보유의 지속 효과는 외관/감각 관련 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Laneige","p":"Water Sleeping Mask","e":"Locks in moisture overnight for intensely hydrated skin"},{"b":"Klairs","p":"Rich Moist Soothing Serum","e":"Provides long-lasting moisture for up to 24 hours"}]},{"s":"a","ko":"즉각적인 수분감을 느낄 수 있어요","en":"Instantly hydrates for a plump, dewy feel","r":"즉각적 수분감은 사용 경험(sensory claim)으로 허용돼요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Torriden","p":"Dive-In Serum","e":"Instantly hydrates for a plump, dewy feel"},{"b":"Some By Mi","p":"Snail Truecica Miracle Repair Toner","e":"Instantly plumps skin with intense hydration"}]},{"s":"a","ko":"촉촉하고 부드러운 피부 겉모습","en":"For soft, smooth, and hydrated-looking skin","r":"피부 외관과 촉감을 묘사하는 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Sulwhasoo","p":"Essential Comfort Balancing Water","e":"For soft, smooth, and visibly nourished skin"},{"b":"Dr.Jart+","p":"Ceramidin Cream","e":"For soft, supple, comfortable-feeling skin"}]},{"s":"c","ko":"수분 장벽을 지원해요","en":"Supports moisture barrier","r":"'지원(supports)'은 생체 기능 변화 여부가 불명확해요. COSRX, Torriden 등 인기 한국 브랜드에서 실제 사용 중이나 엄밀히는 그레이존이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"The claim 'supports moisture barrier' may be interpreted as affecting the physiological function of the skin barrier. FDA has not issued definitive guidance on this specific phrasing, making it a gray area.","dk":"피부 장벽(moisture barrier)은 피부의 생리적 구조예요. '지원(supports)'은 기능 변화를 암시할 수 있어요. 그러나 미국 실제 마켓에서 COSRX, Torriden 등 상위 한국 브랜드들이 폭넓게 사용 중이에요. '장벽 강화(strengthens/repairs barrier)'는 더 위험하고, '피부가 촉촉해 보이는 데 도움이 된다'는 더 안전해요.","ak":"촉촉하고 건강해 보이는 피부","ae":"For skin that looks and feels healthy and hydrated","me":[{"b":"COSRX","p":"Balancium Comfort Ceramide Cream","e":"Supports moisture barrier — Sephora US에서 현재 사용 중"},{"b":"Torriden","p":"Solid-In Ceramide Cream","e":"Supports skin's moisture barrier — Amazon US에서 사용 중"}]},{"s":"c","ko":"피부 수화 능력을 높여요","en":"Increases skin's hydration capacity","r":"'높인다(increases)' + '능력(capacity)'은 생체 기능 변화로 해석될 수 있어요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'increase' a physiological capacity of the skin (such as hydration capacity or water retention ability) may be interpreted as drug claims, as they describe changes to the structure or function of the skin.","dk":"'수화 능력(hydration capacity)'은 피부의 생리적 속성이에요. 이것을 '높인다'고 하면 생체 기능 변화 주장이에요. 대신 'keeps skin hydrated longer', 'for longer-lasting hydration' 등 지속 효과를 묘사하면 더 안전해요.","ak":"수분이 오래 유지돼요","ae":"Helps maintain moisture levels for longer-lasting hydration"},{"s":"c","ko":"천연 보습 인자(NMF)를 보충해요","en":"Replenishes natural moisturizing factors (NMF)","r":"NMF 보충은 생체 내 자연 성분 복원 주장으로 기능 변화 암시가 있어요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'replenish' or 'restore' natural moisturizing factors (NMF) such as amino acids, urocanic acid, or pyrrolidone carboxylic acid may imply restoring a physiological component of the skin, which borders on a drug claim.","dk":"NMF는 피부 각질층의 자연 수분 보유 물질이에요. '보충(replenish)'은 결핍된 생체 성분을 복원한다는 의미여서 기능 변화 암시가 있어요. '피부를 부드럽고 촉촉하게 유지한다' 등 외관/감각 표현이 더 안전해요.","ak":"피부를 부드럽고 촉촉하게 유지해요","ae":"Keeps skin feeling soft, smooth, and hydrated","me":[{"b":"Mediheal","p":"NMF Aquaring Hydrating Serum","e":"Replenishes NMF — 제품명 자체가 NMF를 포함하므로 이 표현과 결합 시 주의"}]},{"s":"p","ko":"세포를 재생시켜요","en":"Regenerates cells / Stimulates cell regeneration","r":"세포 재생은 신체 구조 변화를 주장하는 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"FDA Warning Letter (2020): 'Your product's claims... \"stimulates cell regeneration\" cause your product to be a drug under section 201(g)(1) of the FD&C Act.'","dk":"FDA 경고장에서 직접 인용된 금지 클레임이에요. 세포 재생은 신체의 생물학적 과정이에요. 이를 '촉진', '자극', '활성화'하는 것은 모두 의약품 클레임이에요.","ak":"피부가 활기차 보여요","ae":"Skin looks revitalized and refreshed"},{"s":"p","ko":"피부 장벽을 복구해요","en":"Repairs skin barrier","r":"'복구(repair)'는 손상된 신체 구조를 치료한다는 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claiming to 'repair the skin barrier' implies treating a damaged physiological structure, which constitutes a drug claim under the FD&C Act.","dk":"피부 장벽은 생리적 구조예요. '복구(repair)'는 치료 의미이므로 의약품 클레임이에요. 'supports moisture barrier'는 그레이존이고, 'repairs skin barrier'는 명확히 금지예요. 'for a healthy-looking barrier appearance' 또는 단순히 'moisturizes and conditions skin'이 안전해요.","ak":"피부를 촉촉하고 건강해 보이게 해요","ae":"Moisturizes and conditions skin for a healthy-looking complexion","me":[{"b":"Dr.Jart+","p":"Ceramidin Cream","e":"Repairs skin barrier — Amazon US 일부 페이지에서 사용. 위반 리스크 높음"}]},{"s":"p","ko":"피부 수분 손실을 막아요 (TEWL 감소)","en":"Prevents transepidermal water loss (TEWL)","r":"경피 수분 손실 '방지'는 피부의 물리적 장벽 기능 변화를 주장해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"The claim to 'prevent transepidermal water loss (TEWL)' describes an effect on the physiological water regulation function of the skin, constituting a drug claim.","dk":"TEWL 감소는 과학적 연구 지표예요. 마케팅 카피에 그대로 사용하면 피부의 생리적 수분 조절 기능에 영향을 미친다는 주장이 돼요. '피부를 촉촉하게 유지해요(keeps skin hydrated)'처럼 외관/감각 표현으로 대체해야 해요.","ak":"수분을 오래 가둬줘요","ae":"Helps lock in moisture for long-lasting hydration"},{"s":"p","ko":"피부 pH를 정상화해요","en":"Normalizes skin pH / Restores skin pH balance","r":"pH 정상화는 피부의 생화학적 기능 변화를 주장해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to normalize or restore the skin's pH balance imply altering a physiological/biochemical property of the skin, which is a drug claim.","dk":"피부 pH는 생리적 특성이에요. 이를 '정상화(normalize)'하거나 '회복(restore)'한다는 것은 생체 기능 변화 주장이에요. 'pH 5.5 formulated'처럼 제품 특성을 설명하는 것은 허용돼요. '피부를 편안하게 해요'와 같은 외관/감각 클레임은 안전해요.","ak":"피부가 편안해 보여요 / pH 5.5로 설계된 포뮬라","ae":"Leaves skin looking and feeling comfortable / Formulated at pH 5.5"},{"s":"p","ko":"아쿠아포린을 활성화해요","en":"Activates aquaporins","r":"세포 수준의 수분 채널 단백질 활성화는 명백히 신체 기능 변화를 주장해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'activate aquaporins' — the cellular water channel proteins — describe an effect at the molecular/cellular level of the body, constituting a clear drug claim.","dk":"아쿠아포린(aquaporin)은 세포막의 수분 통로 단백질이에요. 이것을 '활성화'한다는 것은 세포 수준의 생리적 기능 변화 주장이에요. 과학 논문에서 사용되는 표현을 소비자 마케팅에 그대로 옮겨오면 의약품 클레임이 돼요.","ak":"수분이 가득 찬 촉촉한 피부","ae":"For intensely hydrated, plump-looking skin"}],"sensitivity":[{"s":"a","ko":"자극이 적은, 순한 포뮬라예요","en":"Gentle, mild formula","r":"제품 자체의 속성(순함, 자극 적음)을 묘사하는 허용 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Klairs","p":"Supple Preparation Unscented Toner","e":"A gentle, mild formula for sensitive skin"},{"b":"Round Lab","p":"Birch Juice Moisturizing Cleanser","e":"Ultra-gentle, mild cleanser suitable for sensitive skin"}]},{"s":"a","ko":"민감한 피부에도 사용할 수 있어요","en":"Suitable for sensitive skin","r":"사용 가능한 피부 유형을 설명하는 허용 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Cosrx","p":"Low pH Good Morning Gel Cleanser","e":"Suitable for sensitive and acne-prone skin"},{"b":"Klairs","p":"Freshly Juiced Vitamin Drop","e":"Suitable for sensitive skin types"}]},{"s":"a","ko":"피부가 편안해 보여요","en":"Skin looks and feels comfortable and calm","r":"피부의 외관 및 감각적 상태를 묘사하는 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Dr.Jart+","p":"Cicapair Tiger Grass Calming Serum","e":"Skin looks and feels calm and comfortable"},{"b":"Etude","p":"Soon Jung 2x Barrier Intensive Cream","e":"Skin feels calm, comfortable, and soothed"}]},{"s":"a","ko":"붉어 보이는 피부 외관을 개선해요","en":"Visibly reduces the appearance of redness","r":"붉음기 외관 개선은 화장품 허용 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Dr.Jart+","p":"Cicapair Tiger Grass Color Correcting Treatment","e":"Visibly reduces the look of redness"},{"b":"Cosrx","p":"Centella Blemish Cream","e":"Helps reduce the appearance of post-blemish redness"}]},{"s":"a","ko":"향료, 파라벤 미함유 (Fragrance-free, Paraben-free)","en":"Fragrance-free / Paraben-free / Dermatologist-tested","r":"부재 클레임(free-from)과 피부과 테스트 완료는 허용 클레임이에요","law":"21 CFR 700 / FDA Guidance on Free-From Claims","me":[{"b":"Klairs","p":"Supple Preparation Unscented Toner","e":"Fragrance-free, paraben-free, dermatologist-tested"},{"b":"Round Lab","p":"1025 Dokdo Toner","e":"Fragrance-free, alcohol-free, suitable for sensitive skin"}]},{"s":"c","ko":"피부 자극을 줄여요","en":"Reduces skin irritation","r":"자극 '감소'는 증상 치료로 해석될 수 있어요. '자극이 덜 느껴져요'처럼 감각 표현이 더 안전해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'reduce skin irritation' may be interpreted as treating a physiological symptom (irritation), which borders on a drug claim. Context and ingredient combination matter.","dk":"자극(irritation)은 외관상 증상이기도 하고 생리적 반응이기도 해요. '자극이 줄어 보여요(visibly reduces the look of irritation)' 또는 '자극 없이 사용 가능해요(use without irritation)'처럼 외관·경험 중심으로 표현하면 더 안전해요.","ak":"자극 없이 사용할 수 있어요","ae":"Use without irritation / Non-irritating formula","me":[{"b":"Cosrx","p":"Centella Water Alcohol-Free Toner","e":"Reduces skin irritation — 주의 필요"}]},{"s":"c","ko":"피부 진정에 도움이 돼요","en":"Helps soothe skin","r":"'도움(helps soothe)'은 비교적 안전하지만 아토피·피부염 등 질환과 함께 언급되면 즉시 금지 클레임이 돼요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"'Helps soothe skin' in a cosmetic context is generally acceptable. However, when combined with references to specific skin conditions (eczema, dermatitis, psoriasis), it becomes a drug claim.","dk":"'진정(soothe)'은 화장품에서 가장 많이 쓰이는 표현 중 하나예요. 단독으로는 허용되지만, '아토피 피부의 진정', '피부염 증상 완화' 등 질환명과 함께 쓰이면 금지돼요.","ak":"피부가 편안해 보여요","ae":"Skin looks calm and comfortable","me":[{"b":"Cosrx","p":"Advanced Snail Mucin Power Essence","e":"Helps soothe skin — 허용 범위"},{"b":"Dr.Jart+","p":"Cicapair Serum","e":"Helps soothe skin for a calmer-looking complexion — 허용"}]},{"s":"c","ko":"히스타민 반응을 억제해요","en":"Reduces histamine response","r":"히스타민은 면역·알레르기 반응의 생화학 물질이에요. 이를 억제한다는 것은 신체 생화학 기능 변화 주장이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'reduce histamine response' or 'anti-histamine effect' constitute drug claims as they assert interference with an immunological/biochemical process in the body.","dk":"히스타민 반응 억제는 항히스타민 의약품의 영역이에요. '항알레르기(anti-allergic)' 클레임도 동일하게 금지예요. '피부가 편안해 보여요', '자극 없이 사용 가능해요' 등으로 표현해야 해요.","ak":"피부가 편안하고 자극 없이 느껴져요","ae":"Skin feels comfortable and calm"},{"s":"p","ko":"아토피를 완화해요","en":"Relieves atopic dermatitis / Soothes eczema","r":"아토피·습진은 의학적으로 분류된 피부 질환이에요. 이를 완화·치료한다는 것은 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Atopic dermatitis and eczema are classified as medical conditions. Any claim to relieve, treat, or soothe these conditions constitutes a drug claim under the FD&C Act.","dk":"아토피 피부염(atopic dermatitis)과 습진(eczema)은 FDA가 의약품 클레임으로 지정한 질환명이에요. 이들 단어 자체를 클레임에 쓰면 즉시 의약품 클레임이에요. 한국에서는 화장품 기능성 분류인 '아토피 피부염 완화'가 미국에서는 전혀 다른 규제 범주에 속해요.","ak":"민감한 피부에 편안해요","ae":"Gentle and comfortable for sensitive skin","me":[{"b":"일부 한국 브랜드","p":"보습 크림","e":"Soothes atopic-prone skin / Relieves atopic symptoms — 위반 사례"}]},{"s":"p","ko":"염증을 진정시켜요","en":"Calms inflammation / Anti-inflammatory","r":"염증은 의학적 상태이며 이를 진정·억제한다는 것은 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'reduce inflammation,' 'calm inflammation,' or describe a product as 'anti-inflammatory' are drug claims because inflammation is a medical/pathological condition.","dk":"염증(inflammation)은 의학 용어이자 병리적 상태예요. 화장품이 염증을 '진정', '억제', '감소'시킨다고 주장하면 의약품 클레임이에요. 과학 논문에서 세티카산, 마데카소사이드의 항염 효과를 입증했더라도 소비자 카피에 이를 쓰면 안 돼요.","ak":"피부가 편안해 보여요","ae":"Skin looks calm and comfortable","me":[{"b":"Dr.Jart+","p":"Cicapair Tiger Grass Calming Serum","e":"Calms inflammation — 수정 전 표현, 현재는 'calms the look of irritation'으로 수정됨"}]},{"s":"p","ko":"알레르기 반응을 억제해요","en":"Suppresses allergic reactions / Anti-allergic","r":"알레르기 반응 억제는 면역학적 기능 변화를 주장하는 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to suppress or prevent allergic reactions describe effects on the immune system, which is firmly in drug territory under the FD&C Act.","dk":"알레르기 반응은 면역계의 생리적 반응이에요. 이를 '억제', '예방', '감소'한다는 것은 면역 기능 변화 주장이에요. 'non-allergenic', 'allergy-tested', 'suitable for sensitive skin'처럼 제품 특성 묘사는 허용돼요.","ak":"알레르기 테스트 완료 / 민감한 피부에 적합","ae":"Allergy-tested / Suitable for sensitive skin"},{"s":"p","ko":"홍조를 치료해요","en":"Treats rosacea / Treats redness disorder","r":"주사비(rosacea)는 의학적 피부 질환이에요. 치료 주장은 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Rosacea is a chronic inflammatory skin condition classified as a medical disease. Any claim to treat, manage, or cure rosacea is a drug claim.","dk":"로제아(rosacea)는 만성 염증성 피부 질환이에요. '로제아 피부에', '홍조 증상 개선'은 모두 의약품 클레임이에요. '붉어 보이는 피부의 외관을 개선해요(visibly reduces the appearance of redness)'는 허용돼요.","ak":"붉어 보이는 피부 외관을 줄여줘요","ae":"Visibly reduces the appearance of redness"},{"s":"p","ko":"건선에 효과가 있어요","en":"Helps with psoriasis / Effective for psoriasis","r":"건선은 자가면역성 피부 질환이에요. 치료·효능 주장은 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g) / 21 CFR 310","ste":"Psoriasis is a chronic autoimmune skin disease. Claims of effectiveness against psoriasis constitute drug claims and require FDA drug approval.","dk":"건선(psoriasis) 치료는 FDA 승인 의약품(스테로이드, 생물학적 제제 등)의 영역이에요. 어떤 화장품도 건선에 '효과'가 있다고 주장할 수 없어요.","ak":"건조하고 거친 피부 외관을 개선해요","ae":"Helps improve the appearance of dry, rough-looking skin"}],"pore":[{"s":"a","ko":"모공이 작아 보여요","en":"Minimizes the appearance of pores","r":"모공 크기의 외관상 개선은 화장품 허용 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Innisfree","p":"Pore Clearing Clay Mask 2X with Super Volcanic Cluster","e":"Minimizes the appearance of pores"},{"b":"Some By Mi","p":"Bye Bye Blackhead 30 Days Miracle Green Tea Tox Bubble Cleanser","e":"Visibly minimizes the look of pores"}]},{"s":"a","ko":"모공이 더 좁아 보여요","en":"Pores visually appear tighter and less noticeable","r":"시각적 외관 표현이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Cosrx","p":"BHA Blackhead Power Liquid","e":"Pores look tighter and less visible"}]},{"s":"a","ko":"막힌 것처럼 보이는 모공을 깨끗하게","en":"Helps skin look clearer with less-clogged-looking pores","r":"외관 묘사에 한정한 표현이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Innisfree","p":"Bija Trouble Facial Foam","e":"Helps skin look cleaner with less-clogged-looking pores"}]},{"s":"a","ko":"피부결이 고르고 매끄러워 보여요","en":"For smoother, more even-looking skin surface","r":"피부 표면 외관을 묘사하는 허용 클레임이에요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Laneige","p":"Pore Control Cleansing Foam","e":"For smoother, more even-looking skin texture"}]},{"s":"a","ko":"과잉 피지를 흡수해요 (표면 제거)","en":"Absorbs excess surface oil","r":"표면 유분 흡착은 물리적 작용 묘사로 허용 범위예요","law":"21 CFR 700 / FD&C Act §201(i)","me":[{"b":"Innisfree","p":"Super Volcanic Pore Clay Mask","e":"Absorbs excess oil and impurities from pores"},{"b":"Some By Mi","p":"Pore Minish Clay Mask","e":"Absorbs excess surface oil for a mattified look"}]},{"s":"c","ko":"모공을 조여줘요","en":"Tightens pores","r":"'조임(tightening)'은 구조적 변화로 해석될 수 있어요. '조여 보인다(appear tighter)'가 더 안전해요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"The claim 'tightens pores' may imply a structural or functional change to pore size, which could be construed as a drug claim. 'Pores appear tighter' or 'minimizes the appearance of pores' is safer.","dk":"'조인다(tighten)'는 동사가 외관 변화인지 실제 구조 변화인지 문맥에 따라 다르게 해석돼요. '모공이 조여 보여요(pores look tighter)'로 바꾸면 허용 클레임이 돼요.","ak":"모공이 조여 보여요","ae":"Pores appear tighter and less noticeable","me":[{"b":"Innisfree","p":"Pore Tightening Toner","e":"Tightens pores — 제품명에 사용. 그레이존"},{"b":"Cosrx","p":"AHA 7 Whitehead Power Liquid","e":"Tightens the appearance of pores — 허용 범위"}]},{"s":"c","ko":"각질을 녹여 모공을 깨끗하게","en":"Dissolves dead skin cells to unclog pores","r":"'녹인다(dissolves)'는 화학적 작용 묘사로 AHA/BHA 클레임과 연결되면 OTC 클레임 경계선이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims combining the dissolution of skin cells with unclogging pores may, in context with BHA/AHA ingredients, approach acne drug claims if pore-clogging is framed as a medical condition.","dk":"'각질을 제거해요(removes dead skin cells)', '표면 각질을 부드럽게 해요(softens surface skin cells)'는 허용이에요. 그러나 BHA(살리실산) 제품에 '모공 막힘 해소' 클레임을 더하면 OTC 여드름 클레임 영역에 근접해요.","ak":"각질을 부드럽게 제거해서 피부결을 매끄럽게","ae":"Gently exfoliates for smoother-looking skin","me":[{"b":"Cosrx","p":"BHA Blackhead Power Liquid","e":"Dissolves dead skin cells to unclog pores — BHA 성분과 함께 주의"}]},{"s":"c","ko":"모공 크기를 줄여요","en":"Reduces pore size","r":"모공 크기 실제 감소는 구조적 변화를 주장할 수 있어요. '겉모습(appearance)'을 추가하면 허용 범위 안이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claiming to physically 'reduce pore size' implies a structural change to the skin. However, 'reduces the appearance of pore size' is considered a cosmetic claim.","dk":"'모공 크기 감소(reduces pore size)' 단독은 구조적 변화 주장이에요. 반면 'reduces the appearance of pore size' 또는 'pores look smaller'는 명확히 외관 클레임이에요. 'appearance'라는 단어 하나가 허용과 금지를 가를 수 있어요.","ak":"모공의 겉모습이 작아 보여요","ae":"Reduces the appearance of pore size","me":[{"b":"Laneige","p":"Pore Control Blur Primer","e":"Reduces pore size — 일부 마케팅 자료에서 사용. 주의 필요"}]},{"s":"p","ko":"모공 크기를 영구적으로 감소시켜요","en":"Permanently reduces pore size","r":"영구적 구조 변화 주장은 명백한 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Any claim of permanent structural change to the skin — including permanent pore size reduction — constitutes a drug claim, as it implies affecting the structure of the body on a lasting basis.","dk":"'영구적(permanent)'이라는 단어는 일시적 외관 변화를 넘어 영구적 구조 변화를 주장해요. 이는 어떤 화장품도 할 수 없는 주장이에요.","ak":"모공이 작아 보여요","ae":"Pores visibly appear smaller"},{"s":"p","ko":"피지 분비를 조절해요","en":"Controls sebum production / Regulates sebum secretion","r":"피지 분비는 피지선의 생리적 기능이에요. 이를 '조절', '조정'한다는 것은 신체 기능 변화 주장이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims to 'control sebum production' or 'regulate sebum secretion' describe effects on the physiological function of the sebaceous glands, constituting drug claims.","dk":"피지선(sebaceous gland)의 분비 기능을 변화시킨다는 주장은 의약품 클레임이에요. '표면 유분을 흡수해요(absorbs excess surface oil)', '오일-프리 느낌(oil-free feel)'처럼 표면 현상에 한정하면 허용돼요.","ak":"표면 유분을 흡수해서 번들거림을 줄여요","ae":"Absorbs excess surface oil for a matte finish","me":[{"b":"Cosrx","p":"AHA/BHA Clarifying Treatment Toner","e":"Regulates sebum production — 금지 클레임"}]},{"s":"p","ko":"면포(블랙헤드·화이트헤드)를 치료해요","en":"Treats comedones / Treats blackheads and whiteheads","r":"면포는 여드름의 의학적 분류이므로 치료 주장은 OTC 여드름 의약품 클레임이에요","law":"21 CFR 333 / FD&C Act §201(g)","ste":"Comedones (blackheads and whiteheads) are a medically classified form of acne. Claims to 'treat' comedones fall under 21 CFR 333, requiring OTC acne drug registration.","dk":"면포(comedo)는 의학적으로 비염증성 여드름으로 분류돼요. '치료(treat)', '제거(eliminate)', '해소(clear)'는 모두 OTC 여드름 의약품 클레임이에요.","ak":"막힌 것처럼 보이는 모공이 깨끗해 보여요","ae":"Helps skin look clear and pores less congested"},{"s":"p","ko":"모공 속 피지선을 수축시켜요","en":"Shrinks sebaceous glands in pores","r":"피지선 수축은 신체 구조·기능 변화를 주장하는 의약품 클레임이에요","law":"21 CFR 700 / FD&C Act §201(g)","ste":"Claims asserting physical changes to sebaceous glands — such as shrinkage or contraction — constitute drug claims as they describe changes to the structure of the body.","dk":"피지선은 피부의 물리적 구조예요. 이것의 '수축', '축소'를 주장하는 것은 신체 구조 변화 주장이에요. 어떤 화장품도 이런 클레임을 할 수 없어요.","ak":"모공이 덜 보여요","ae":"For skin with less-visible pores"},{"s":"p","ko":"모공을 막는 피지 분비를 방지해요","en":"Prevents pore-clogging sebum production","r":"피지 분비 방지 + 모공 막힘 예방의 결합은 OTC 여드름 의약품 클레임이에요","law":"21 CFR 333 / 21 CFR 700 / FD&C Act §201(g)","ste":"A combined claim of preventing sebum production and preventing pore clogging directly maps to the mechanism of acne formation, constituting an OTC acne drug claim under 21 CFR 333.","dk":"모공 막힘은 여드름의 의학적 발생 기전이에요. 피지 분비를 방지해 모공 막힘을 예방한다는 클레임은 여드름 예방 주장과 동일해요. OTC 여드름 의약품 등록이 필요해요.","ak":"피부 표면을 깨끗하게 해요","ae":"Helps keep skin's surface clean and clear-looking"}],"moisture_hydration":[{"s":"a","ko":"모발에 수분감을 더해줘요","en":"Adds moisture to hair","r":"외관/감촉상 변화만 주장, 신체 기능 변화 없음","law":"FD&C Act §201(i)","me":[{"b":"La'dor","p":"Moisture Balancing Shampoo","e":"Adds instant moisture to dry, damaged hair"}]},{"s":"a","ko":"건조하고 거칠어 보이는 모발을 부드럽게 가꿔줘요","en":"Softens the look and feel of dry, rough hair","r":"감촉 개선 클레임, 외관 영역","law":"21 CFR 701 / FD&C Act §201(i)","me":[{"b":"Hair Recipe","p":"Rice Repair Shampoo","e":"Softens dry, brittle-looking hair"}]},{"s":"a","ko":"즉각적인 수분감으로 모발이 부드럽고 촉촉해 보여요","en":"Instantly hydrates for hair that looks and feels softer and more manageable","r":"즉각적 외관 개선, 관리 {"g":"antimicrobial","kw":["트리클로산","triclosan"],"t":"항균","m":"항균 성분이에요. 항균 클레임 시 OTC 의약품 분류. 안전성 논란.","sv":"c","ref":"FDA Antiseptic Rule","cl":["항균 클레임 여부","OTC 해당 여부"]},{"g":"oral","kw":["불화나트륨","소듐플루오라이드","sodium fluoride"],"t":"구강 케어 (OTC)","m":"불소 성분이에요. 치약에 포함 시 OTC 의약품 (Drug Facts 필수).","sv":"e","ref":"21 CFR 355","cl":["Drug Facts 패널 필수","불소 치약 OTC 등록"]}];const ITG={"aha_bha":"AHA/BHA 산성 성분","otc_active":"OTC 의약품 활성 성분","sunscreen":"선스크린 활성 성분","skin_lighten":"미백/레티노이드","hair_color":"헤어컬러 주의 성분","preservative":"방부제 (캐나다 제한)","antimicrobial":"항균/발한 억제","oral":"구강 케어"};
const FAQ={"us":[{"q":"클렌저에 'deep cleansing' 또는 '딥클렌징'이라고 써도 되나요?","a":"주의가 필요해요. FDA는 'deep cleansing'을 모공 구조 변화를 암시하는 표현으로 해석할 수 있어요. 이 경우 제품이 코스메틱이 아닌 드럭으로 분류될 수 있어요.","kw":["deep cleansing","딥클렌징","deep clean","pore cleansing","모공"],"alt":"'Thoroughly cleanses', 'Deeply purifies', 'Removes impurities'를 사용해보세요."},{"q":"선스크린은 코스메틱인가요, 드럭인가요?","a":"미국에서 선스크린은 OTC(일반의약품) 드럭으로 분류돼요. FDA OTC Drug Monograph를 따라야 하고, 라벨에 Drug Facts 박스가 필수예요. 코스메틱 규정만 적용하면 안 돼요.","kw":["sunscreen","선스크린","SPF","자외선 차단","OTC drug"]},{"q":"성분표 표기 순서 규칙이 있나요?","a":"네, 있어요. 1% 초과 성분은 함량 높은 순서대로 먼저 표기하고, 1% 이하 성분은 어떤 순서든 가능해요. INCI(국제화장품성분명명법) 명칭을 사용해야 해요. 한국어 성분명은 병기할 수 있지만, INCI 명칭이 반드시 있어야 해요.","kw":["성분표","INCI","ingredient list","성분 순서","표기 순서"]},{"q":"MoCRA 시설 등록은 한국 공장이 직접 해야 하나요?","a":"네, 한국 제조 공장이 FDA Cosmetics Direct에 직접 등록해야 해요. 한국 공장과 미국 브랜드사가 다르더라도 제조 시설이 등록되어야 해요. 미등록 시 미국 세관에서 자동 차단될 수 있어요.","kw":["MoCRA","시설 등록","facility registration","FDA 등록"]},{"q":"제품 리스팅은 언제까지 해야 하나요?","a":"미국에서 처음 판매를 시작한 후 120일 이내에 FDA에 제품 리스팅을 해야 해요. 연간 화장품 매출이 $1M 미만인 소기업은 면제돼요.","kw":["product listing","제품 리스팅","FDA 리스팅","120일"]},{"q":"미국 수출 화장품 라벨에 반드시 들어가야 하는 항목이 무엇인가요?","a":"필수 항목은 다음 5가지예요: ① 제품명, ② 순 중량(fl oz/oz 또는 mL/g 병기), ③ 성분표 (INCI), ④ 제조사/유통사 미국 주소 또는 연락처, ⑤ 사용상 주의사항(해당 시). 모든 텍스트는 영어가 기본이에요.","kw":["라벨 필수 항목","required label","mandatory label","영문 라벨"]},{"q":"'콜라겐 생성을 촉진한다'고 써도 되나요?","a":"안 돼요. 콜라겐 생성 촉진은 피부 구조/기능에 영향을 주는 드럭 클레임이에요. 이 표현을 쓰면 FDA가 제품을 드럭으로 분류할 수 있어요.","kw":["anti-aging","안티에이징","주름 개선","collagen","콜라겐 생성"],"alt":"'Visibly reduces the appearance of fine lines', 'Skin looks firmer and more youthful'처럼 외관 변화 표현을 사용해보세요."},{"q":"'Hypoallergenic' 또는 'Dermatologist tested'라고 쓸 수 있나요?","a":"쓸 수 있지만 주의가 필요해요. FDA는 이 용어에 대한 공식 정의나 기준을 두지 않아요. 그러나 FTC는 허위·과장 광고를 금지하므로 실제 테스트나 근거가 없으면 오해를 살 수 있어요.","kw":["hypoallergenic","저자극","dermatologist tested","피부과 테스트"],"alt":"실제 테스트를 진행했다면 사용 가능해요. 테스트 결과 문서를 보관해두세요."},{"q":"순 중량은 mL만 적어도 되나요?","a":"안 돼요. 미국 라벨에는 영국식 단위(fl oz, oz)와 미터식 단위(mL, g)를 둘 다 병기해야 해요. 예: '100 mL (3.4 fl oz)' 형태로요.","kw":["net weight","순중량","fl oz","mL","단위"]},{"q":"토너 라벨에 'balances skin pH'라고 써도 되나요?","a":"주의가 필요해요. 피부 pH를 조절한다는 표현은 피부의 생리적 기능에 영향을 미친다고 해석될 수 있어요. 이 경우 드럭 클레임으로 분류될 가능성이 있어요.","kw":["toner","토너","skin toner","astringent","pH 조절"],"alt":"'Helps skin feel refreshed and balanced', 'Preps skin for next skincare steps'를 사용해보세요."},{"q":"레티놀 제품에 'accelerates cell turnover'라고 써도 되나요?","a":"안 돼요. 세포 교체를 가속화한다는 클레임은 피부의 생물학적 기능을 바꾼다는 의미로, 드럭 클레임이에요. 레티놀은 코스메틱 성분으로 사용할 수 있지만, 약리 작용 클레임은 불가해요.","kw":["retinol","레티놀","cell turnover","세포 교체","retinoic acid"],"alt":"'Visibly smooths skin texture', 'Skin looks renewed and radiant'으로 바꿔보세요."},{"q":"이상반응이 생기면 언제까지 FDA에 신고해야 하나요?","a":"심각한 이상반응(입원, 생명 위협 등)은 인지 후 15 영업일 이내에 FDA에 보고해야 해요. 모든 이상반응 기록은 6년간 보관해야 해요. 소기업도 이 의무에서는 면제되지 않아요.","kw":["adverse event","이상반응","AER","부작용 신고","15 영업일"]},{"q":"'Organic' 또는 'Natural' 표현은 자유롭게 쓸 수 있나요?","a":"주의가 필요해요. 'Organic'은 USDA 인증을 받아야 정식으로 사용할 수 있어요. 'Natural'은 공식 정의가 없지만 FTC 허위광고 기준에 걸릴 수 있어요. 실제 성분과 일치하는 범위에서만 사용하세요.","kw":["organic","오가닉","natural","내추럴","USDA organic"],"alt":"'Made with natural ingredients', 'Plant-derived' 등 더 구체적인 표현을 쓰세요."},{"q":"향료는 성분표에 어떻게 표기하나요?","a":"향료 혼합물은 단순히 'Fragrance' 또는 'Parfum'으로 묶어서 표기해도 돼요. 단, 알레르기 유발 가능성이 있는 특정 향 성분(26종 EU 기준 등)을 별도 표기하는 추가 규정은 현재 미국에는 없어요. 다만 향후 규제 강화 가능성은 있어요.","kw":["fragrance","향료","parfum","fragrance-free","unscented"]},{"q":"'Whitening' 또는 'Skin Lightening' 클레임은 어떻게 되나요?","a":"피부 색소를 실제로 줄인다는 효능 클레임(whitening, skin lightening)은 OTC 드럭 클레임이에요. FDA OTC Monograph에 승인된 성분(예: hydroquinone, kojic acid 등)을 사용하고 Drug Facts를 표기해야 해요.","kw":["whitening","미백","brightening","skin lightening","색소 침착"],"alt":"'Brightens complexion', 'Evens skin tone', 'Skin looks more radiant'처럼 외관 묘사 표현을 쓰세요."},{"q":"미국으로 수출할 때 cGMP(Good Manufacturing Practice)를 반드시 따라야 하나요?","a":"네, MoCRA 이후 FDA는 코스메틱에도 cGMP 기준을 적용해요. 단, 소기업($1M 미만) 및 very small business($250K 미만)는 단계적으로 적용돼요. 한국 제조사도 FDA cGMP 기준에 맞는 시설을 갖춰야 해요.","kw":["GMP","제조 기준","good manufacturing practice","cGMP"]},{"q":"'여드름 완화' 또는 'anti-acne' 클레임을 써도 되나요?","a":"안 돼요. 여드름 치료/완화는 OTC 드럭 클레임이에요. Salicylic acid, benzoyl peroxide 등 FDA 승인 성분을 사용하고, Drug Facts 표기 및 OTC Monograph를 따라야 해요.","kw":["acne","여드름","anti-acne","blemish","살리실산","salicylic acid"],"alt":"'Helps minimize the look of blemishes', 'For clearer-looking skin'처럼 외관 클레임으로 바꿔보세요."},{"q":"유통기한이나 개봉 후 사용기한을 라벨에 표기해야 하나요?","a":"미국 FDA는 화장품에 유통기한 표기를 의무화하지 않아요. 단, 선스크린 등 OTC 드럭으로 분류된 제품은 만료일 표기가 의무예요. 코스메틱의 경우 자발적으로 표기하는 건 괜찮아요.","kw":["expiry","유통기한","expiration date","PAO","개봉 후 사용기한"]},{"q":"'Cruelty-free' 또는 'Vegan' 마크를 붙이고 싶어요. 규정이 있나요?","a":"미국 FDA에는 'cruelty-free'나 'vegan'에 대한 공식 정의나 규정이 없어요. 단, FTC는 허위·오해 소지가 있는 클레임을 금지해요. 실제 동물실험을 하지 않고, 서드파티(Leaping Bunny, PETA 등) 인증을 받으면 가장 안전해요.","kw":["cruelty-free","동물실험","vegan","비건","leaping bunny"]},{"q":"헤어 제품에 '탈모 예방' 또는 '모발 성장 촉진'이라고 써도 되나요?","a":"안 돼요. 모발 성장을 촉진하거나 탈모를 치료/예방한다는 클레임은 OTC 드럭 또는 처방약 클레임이에요. 이런 표현이 있으면 제품이 드럭으로 분류돼요.","kw":["hair growth","탈모","모발 성장","hair loss","alopecia"],"alt":"'Helps hair look thicker and fuller', 'Adds volume to thinning-looking hair'처럼 외관 표현으로 변경하세요."},{"q":"미국 내 대리인(U.S. Agent)은 꼭 필요한가요?","a":"네, 미국 외 시설에서 제조한 화장품은 미국 내 대리인을 반드시 지정해야 해요. 대리인은 미국 내 거주자이거나 미국 내에 사무소가 있어야 해요. FDA와 시설 간의 공식 연락 창구 역할을 해요.","kw":["U.S. agent","미국 대리인","contact person","수입업자"]},{"q":"'피부 장벽을 강화한다'고 써도 되나요?","a":"주의가 필요해요. '피부 장벽 강화'는 피부의 생리적 기능을 개선한다는 의미로 해석될 수 있어요. FDA는 이를 드럭 클레임으로 볼 가능성이 있어요.","kw":["moisturizer","보습","moisture barrier","피부 장벽","skin barrier"],"alt":"'Helps skin feel stronger', 'Visibly improves skin resilience', 'Skin looks more protected and healthy'로 바꿔보세요."}],"ca":[{"q":"캐나다에 화장품을 팔기 전에 신고가 필요한가요?","a":"네, 캐나다에서 판매하는 화장품은 출시 후 10일 이내에 Health Canada에 CNF(Cosmetic Notification Form)을 제출해야 해요. 미국과 달리 캐나다는 사후 신고 방식이에요.","kw":["CNF","코스메틱 노티피케이션","cosmetic notification","사전 신고"]},{"q":"캐나다 Hot List가 무엇인가요?","a":"Hot List는 캐나다 화장품에 사용이 금지되거나 제한된 성분 목록이에요. EU 금지 목록보다 일부 다를 수 있어요. 제품 기획 시 Hot List에서 사용 성분을 반드시 확인해야 해요.","kw":["Hot List","금지 성분","restricted ingredients","제한 성분"]},{"q":"캐나다 라벨은 반드시 영어와 프랑스어 두 언어로 해야 하나요?","a":"네, 캐나다는 공식 이중언어 국가예요. 모든 화장품 라벨의 필수 정보(제품명, 성분표, 주의사항, 제조사 정보 등)는 영어와 프랑스어로 모두 표기해야 해요.","kw":["이중언어","bilingual","French","영불 병기","프랑스어"]},{"q":"제품이 화장품인지 NHP(천연 건강 제품)인지 어떻게 구분하나요?","a":"캐나다는 제품의 의도된 용도(intended use)와 성분을 기준으로 화장품과 NHP를 구분해요. 예를 들어 자외선 차단, 항균, 체취 억제(안티퍼스피런트) 등의 클레임이 있으면 NHP 또는 OTC 드럭으로 분류될 수 있어요. NHP는 별도의 허가 번호(NPN)가 필요해요.","kw":["NHP","natural health product","천연 건강 제품","캐나다 분류"]},{"q":"안티퍼스피런트는 캐나다에서 코스메틱인가요, 드럭인가요?","a":"캐나다에서 안티퍼스피런트는 드럭(Drug)으로 분류돼요. NPN(Natural Product Number)을 받아야 판매할 수 있어요. 단순 체취 억제(masking) 기능의 데오도란트는 코스메틱으로 분류될 수 있어요.","kw":["antiperspirant","안티퍼스피런트","데오도란트","deodorant","체취"]},{"q":"캐나다 라벨 순 중량 단위는 어떻게 해야 하나요?","a":"캐나다는 미터법(SI 단위)을 기본으로 써요. mL, g로 표기하면 돼요. 추가로 영국식 단위(fl oz, oz)를 병기할 수 있지만, 미국과 달리 필수는 아니에요.","kw":["미터법","metric","mL","g","순중량","net weight"]},{"q":"캐나다에서 선스크린 판매는 어떻게 해야 하나요?","a":"캐나다에서 선스크린은 OTC 드럭으로 분류돼요. 판매 전에 Health Canada로부터 DIN(Drug Identification Number)을 받아야 해요. NPN과는 다른 별도의 승인 절차예요.","kw":["sunscreen","선스크린","SPF","자외선 차단","Drug Identification Number","DIN"]},{"q":"성분표도 영어와 프랑스어 둘 다 써야 하나요?","a":"INCI 명칭은 국제 표준이라 그대로 써도 돼요. 단, 성분표 앞에 붙는 헤더('Ingredients' / 'Ingrédients')는 영불 병기가 필요해요. 일부 성분명은 프랑스어 번역을 추가하기도 해요.","kw":["INCI","성분 표기","ingredient list","성분명","프랑스어 성분"]},{"q":"파라벤 계열 성분은 캐나다에서 사용해도 되나요?","a":"일부 파라벤은 Hot List에서 농도 제한이 있어요. Propylparaben, Butylparaben은 rinse-off 제품 0.19%, leave-on 제품 0.19%로 제한돼요. Methylparaben, Ethylparaben은 일정 농도 이하에서 허용돼요. 사용 전 Hot List 최신 버전을 반드시 확인하세요.","kw":["paraben","파라벤","methylparaben","propylparaben","Hot List 성분"]},{"q":"포름알데히드 방출 방부제를 사용해도 되나요?","a":"캐나다 Hot List에서 포름알데히드 및 일부 방출 성분(DMDM Hydantoin, Quaternium-15 등)은 특정 농도 이상 사용이 금지 또는 제한돼요. Leave-on 제품에는 더 엄격한 기준이 적용돼요.","kw":["formaldehyde","포름알데히드","releasing agent","방부제"]},{"q":"캐나다 라벨에 꼭 캐나다 주소가 있어야 하나요?","a":"네, 라벨에 제품 판매를 책임지는 캐나다 내 사업체 이름과 주소가 있어야 해요. 캐나다 외 제조사의 경우 캐나다 수입업체 또는 유통사 정보를 기재해야 해요.","kw":["dealer name","제조사 표기","캐나다 주소","importer","수입업체"]},{"q":"캐나다에서 사용 가능한 색소 성분은 어떻게 확인하나요?","a":"캐나다는 Health Canada의 Permitted Colour Additives 목록에 있는 색소만 사용할 수 있어요. 미국 FDA D&C 색소 목록과 일부 다를 수 있어요. 특히 색조 제품에서는 캐나다 허가 색소 목록을 별도로 확인해야 해요.","kw":["colorant","색소","permitted colour","D&C","FD&C"]},{"q":"비듬 방지 샴푸나 여드름 케어 제품을 캐나다에서 팔 수 있나요?","a":"비듬 방지(anti-dandruff)나 여드름 치료 효능 클레임이 있으면 NHP 또는 드럭으로 분류돼요. 별도 허가(NPN 또는 DIN)를 받아야 판매할 수 있어요. 화장품으로는 출시할 수 없어요.","kw":["medicated","약용","acne treatment","anti-dandruff","비듬 샴푸"]},{"q":"캐나다 화장품에 주의사항을 반드시 표기해야 하나요?","a":"제품에 따라 달라요. 특정 성분(예: 알파하이드록시산, 살리실산, 색소 등)이 포함된 경우 Health Canada가 지정한 주의사항 문구를 반드시 라벨에 표기해야 해요. 주의사항도 영불 이중언어로 써야 해요.","kw":["warning","주의사항","caution statement","경고 문구"]},{"q":"항균 핸드워시나 손 소독제는 캐나다에서 화장품인가요?","a":"아니에요. 항균 또는 소독 클레임이 있는 제품은 NHP 또는 드럭으로 분류돼요. 별도 허가를 받아야 해요. 단, 일반 세정 목적의 핸드워시는 화장품으로 분류돼요.","kw":["hand sanitizer","손 소독제","antibacterial","항균","sanitizing"],"alt":"'Cleanses hands thoroughly'처럼 세정 클레임만 사용하면 코스메틱으로 유지할 수 있어요."},{"q":"레티놀 제품을 캐나다에서 판매할 때 특별한 라벨 요건이 있나요?","a":"네. 레티놀(Retinol) 함량이 일정 수준 이상인 제품은 Health Canada 가이드라인에 따라 자외선 주의, 임산부 사용 주의 등의 경고 문구를 라벨에 표기해야 해요. 최신 Health Canada 가이드라인을 꼭 확인하세요.","kw":["retinol","레티놀","retinoid","vitamin A","AHA","알파하이드록시산"]},{"q":"탈크(Talc) 성분을 캐나다 화장품에 쓸 수 있나요?","a":"탈크 자체는 금지 성분이 아니에요. 그러나 석면(asbestos) 오염이 없는 정제된 탈크만 사용해야 해요. Health Canada는 특히 영아용 제품에서의 탈크 사용을 주의 권고하고 있어요.","kw":["talc","탈크","asbestos","석면","베이비 파우더"]},{"q":"성분이나 포장이 바뀌면 CNF를 다시 제출해야 하나요?","a":"성분, 제품명, 제조사 등 주요 정보가 변경되면 Health Canada에 업데이트 CNF를 다시 제출해야 해요. 단순 디자인 변경은 해당되지 않아요.","kw":["CNF 갱신","notification update","성분 변경","제품 변경"]},{"q":"트리클로산(Triclosan)을 방부제로 사용해도 되나요?","a":"주의가 필요해요. 트리클로산은 캐나다 Hot List에서 특정 제품 유형에서 제한 농도가 있어요. 또한 항균 클레임과 함께 사용하면 드럭 분류로 이어질 수 있어요.","kw":["triclosan","트리클로산","antibacterial agent","항균 성분"]},{"q":"영구 헤어 염색 제품에 필수 경고 문구가 있나요?","a":"네. 산화 헤어 염색 제품(permanent hair color)에는 Health Canada가 요구하는 알레르기 테스트 권고 문구, 특정 성분 경고(p-phenylenediamine 등) 등을 라벨에 반드시 표기해야 해요. 영불 이중언어로 표기해야 해요.","kw":["hair dye","헤어 다이","permanent hair color","산화 염료","p-phenylenediamine"]},{"q":"스크럽 제품에 마이크로비즈(플라스틱 마이크로비즈)를 넣어도 되나요?","a":"안 돼요. 캐나다는 헹구는 화장품(rinse-off cosmetics)에 플라스틱 마이크로비즈 사용 및 판매를 금지하고 있어요. 천연 각질 제거 성분(walnut shell powder, sugar 등)을 대신 사용해야 해요.","kw":["microbeads","마이크로비즈","plastic particles","microplastics"],"alt":"'Walnut shell powder', 'Bamboo powder', 'Sugar crystals' 등 자연 유래 스크럽 성분을 사용하세요."}],"compare":[{"q":"선스크린이 미국에서는 드럭, 캐나다에서는 다른가요?","a":"미국: 미국: OTC 드럭으로 분류. FDA OTC Monograph(21 CFR 352) 적용. Drug Facts 표기 필수.\n캐나다: 캐나다: OTC 드럭으로 분류. Health Canada에서 DIN(Drug Identification Number) 취득 필요. Drug Facts 대신 캐나다 OTC Drug Labelling 규정 적용.\n핵심 차이: 둘 다 드럭이지만 인허가 절차가 달라요. 미국은 FDA Monograph, 캐나다는 DIN 신청이에요.","kw":["선스크린","sunscreen","SPF","분류 차이","OTC drug","DIN"]},{"q":"안티퍼스피런트 분류가 미국과 캐나다에서 다른가요?","a":"미국: 미국: OTC 드럭으로 분류. FDA OTC Monograph(21 CFR 350) 적용. Drug Facts 표기 필수.\n캐나다: 캐나다: 드럭(Drug)으로 분류. NPN(Natural Product Number) 또는 DIN 취득 필요.\n핵심 차이: 두 나라 모두 드럭으로 분류하지만, 미국은 OTC Monograph 방식, 캐나다는 NPN/DIN 허가 방식이에요. 규제 경로가 완전히 달라요.","kw":["안티퍼스피런트","antiperspirant","deodorant","분류 차이"]},{"q":"라벨 언어 요건이 미국과 캐나다에서 어떻게 다른가요?","a":"미국: 미국: 영어 표기가 기본. 영어 외 언어를 추가할 수 있지만 필수는 아니에요.\n캐나다: 캐나다: 영어 + 프랑스어 이중언어 표기가 법적 의무예요. 제품명, 성분표 헤더, 주의사항 등 모든 필수 정보를 영불로 써야 해요.\n핵심 차이: 미국은 영어만 있으면 되지만, 캐나다는 반드시 영어+프랑스어 이중언어가 필요해요. 캐나다 라벨 제작 비용이 더 들 수 있어요.","kw":["라벨 언어","bilingual","French","영어","언어 요건"]},{"q":"순 중량 단위 표기가 미국과 캐나다에서 다른가요?","a":"미국: 미국: 영국식 단위(fl oz, oz)와 미터식 단위(mL, g)를 반드시 둘 다 병기해야 해요.\n캐나다: 캐나다: 미터식 단위(mL, g)만 필수예요. 영국식 단위 병기는 선택사항이에요.\n핵심 차이: 미국 라벨에는 '100 mL (3.4 fl oz)'처럼 둘 다 써야 해요. 캐나다는 '100 mL'만 써도 돼요.","kw":["순중량","net weight","fl oz","mL","단위 차이"]},{"q":"미국과 캐나다의 화장품 등록/신고 시점이 다른가요?","a":"미국: 미국(MoCRA): 판매 시작 후 120일 이내 FDA 제품 리스팅. 제조 시설 등록도 필요.\n캐나다: 캐나다: 판매 시작 후 10일 이내 Health Canada에 CNF 제출. 훨씬 빠른 신고가 필요해요.\n핵심 차이: 미국은 120일 여유가 있지만, 캐나다는 10일 이내로 훨씬 촉박해요. 캐나다 출시 전에 미리 CNF를 준비해 두세요.","kw":["사전 신고","사후 신고","등록","CNF","FDA 리스팅","registration"]},{"q":"미국과 캐나다의 화장품 금지/제한 성분 목록이 다른가요?","a":"미국: 미국: FDA 금지 성분 목록(21 CFR 700.11 등) 적용. 목록이 상대적으로 짧아요.\n캐나다: 캐나다: Health Canada Hot List 적용. EU 규제와 유사하게 더 많은 성분을 제한해요.\n핵심 차이: 캐나다 Hot List가 미국 FDA 목록보다 더 광범위해요. 미국에서 허용되는 성분이 캐나다에서 제한될 수 있어요. 동시 출시 시 캐나다 Hot List 기준에 맞춰야 해요.","kw":["금지 성분","banned ingredients","Hot List","prohibited ingredients","성분 차이"]},{"q":"마이크로비즈 규제가 미국과 캐나다에서 다른가요?","a":"미국: 미국: Microbead-Free Waters Act(2015)로 린스오프 화장품의 플라스틱 마이크로비즈 제조·판매 금지.\n캐나다: 캐나다: Microbeads in Toiletries Regulations(2017)으로 동일하게 금지.\n핵심 차이: 두 나라 모두 금지예요. 동일 제품으로 양국 수출 시 마이크로비즈가 없는지 확인하면 돼요.","kw":["microbeads","마이크로비즈","플라스틱 성분","plastic particles"]},{"q":"'미백' 또는 'Whitening' 클레임이 두 나라에서 다르게 해석되나요?","a":"미국: 미국: 피부 색소를 실제로 줄이는 효능 클레임은 OTC 드럭 클레임이에요. 'Brightening', 'Radiance' 같은 외관 표현은 코스메틱으로 가능해요.\n캐나다: 캐나다: 마찬가지로 피부 색소 감소 효능 클레임은 드럭 또는 NHP 클레임이에요. 'Brightens complexion' 같은 외관 표현은 코스메틱으로 가능해요.\n핵심 차이: 두 나라 모두 효능 기반 미백 클레임은 드럭이에요. 한국에서 쓰는 '미백' 표현을 영문 그대로 번역하면 안 돼요. 외관 묘사 표현으로 바꿔야 해요.","kw":["whitening","미백","skin lightening","brightening","클레임 차이"]},{"q":"미국과 캐나다에 같은 라벨을 쓸 수 있나요?","a":"미국: 미국: 영어 전용, fl oz+mL 병기, Drug Facts(해당 시) 필수.\n캐나다: 캐나다: 영불 이중언어, mL 단위 기본, 캐나다 주소 필수.\n핵심 차이: 두 나라의 라벨 요건이 달라서 동일 라벨 사용이 어려워요. 캐나다 규정을 충족하면 대체로 미국 요건도 포함할 수 있어요(영불 병기 + mL/fl oz 둘 다). 단, 캐나다 주소와 미국 주소를 각각 표기해야 할 수 있어요.","kw":["동일 라벨","dual market label","공용 라벨","미국 캐나다 동시"]},{"q":"캐나다에만 있는 NHP 분류는 무엇인가요?","a":"미국: 미국: 화장품 아니면 드럭(처방 또는 OTC). 중간 카테고리 없음.\n캐나다: 캐나다: 화장품, NHP(Natural Health Product), 드럭 세 가지 카테고리가 있어요. 천연 성분 기반으로 건강 효능 클레임이 있는 제품은 NHP로 분류돼요.\n핵심 차이: 캐나다에만 있는 NHP 카테고리를 이해해야 해요. 미국에서 코스메틱인 제품이 캐나다에서 NHP가 될 수 있어요. 예: 특정 에센셜 오일 제품, 천연 항산화 스킨케어 등.","kw":["NHP","OTC drug","드럭 분류","NPN","DIN","분류 기준 차이"]},{"q":"이상반응 보고 의무가 미국과 캐나다에서 다른가요?","a":"미국: 미국(MoCRA): 심각한 이상반응은 인지 후 15 영업일 이내 FDA 보고 의무. 소기업도 면제 없음.\n캐나다: 캐나다: 현재 화장품에 대한 법적 AER 의무 규정이 미국만큼 명확하지 않아요. 단, 드럭으로 분류된 제품(선스크린, 안티퍼스피런트 등)은 의약품 이상반응 보고 규정이 적용돼요.\n핵심 차이: 미국은 코스메틱도 이상반응 보고 의무가 명확해요. 캐나다는 코스메틱의 경우 상대적으로 덜 엄격하지만, 드럭 분류 제품은 별도 규정이 적용돼요.","kw":["adverse event","이상반응 보고","AER","시판 후 감시"]},{"q":"미국과 캐나다에 동시 출시할 때 가장 주의할 점은 무엇인가요?","a":"미국: 미국: MoCRA 시설 등록, 120일 이내 제품 리스팅, 드럭 클레임 여부 확인.\n캐나다: 캐나다: 10일 이내 CNF 제출, 이중언어 라벨, Hot List 성분 확인, 드럭/NHP 분류 검토.\n핵심 차이: 캐나다 10일 CNF 기한이 가장 촉박해요. 출시 전에 CNF를 미리 준비해 두세요. 또한 캐나다 라벨(이중언어)을 미국보다 먼저 준비하면 양국 라벨을 효율적으로 통합할 수 있어요.","kw":["동시 출시","dual launch","전략","미국 캐나다 동시 수출"]}]};
